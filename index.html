<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciborg Kids - Plataforma Premium</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Font Awesome para íconos premium -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ============================================================
           ESTILOS PREMIUM
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Gradientes animados */
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .gradient-animated {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            animation: gradient-shift 6s ease-in-out infinite;
        }

        .gradient-animated-2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
            background-size: 200% 200%;
            animation: gradient-shift 8s ease-in-out infinite;
        }

        /* Cards con efecto 3D */
        .card-3d {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-3d:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        /* Neumorfismo */
        .neumorphic {
            background: #f0f4f8;
            box-shadow: 12px 12px 24px rgba(0, 0, 0, 0.05), -12px -12px 24px rgba(255, 255, 255, 0.8);
            border-radius: 20px;
        }

        .neumorphic-inset {
            background: #f0f4f8;
            box-shadow: inset 8px 8px 16px rgba(0, 0, 0, 0.05), inset -8px -8px 16px rgba(255, 255, 255, 0.8);
            border-radius: 20px;
        }

        /* Efectos de hover en botones */
        .btn-premium {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-premium:hover::before {
            left: 100%;
        }

        /* Animación de entrada para elementos */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease forwards;
        }

        .animate-fade-in-up:nth-child(2) { animation-delay: 0.1s; }
        .animate-fade-in-up:nth-child(3) { animation-delay: 0.2s; }
        .animate-fade-in-up:nth-child(4) { animation-delay: 0.3s; }
        .animate-fade-in-up:nth-child(5) { animation-delay: 0.4s; }

        /* Loading spinner premium */
        .spinner-premium {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(102, 126, 234, 0.1);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        /* Badges premium */
        .badge-premium {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Progress bar premium */
        .progress-premium {
            height: 8px;
            border-radius: 10px;
            background: #e5e7eb;
            overflow: hidden;
            position: relative;
        }

        .progress-premium-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            background-size: 200% 200%;
            animation: gradient-shift 3s ease-in-out infinite;
            transition: width 1s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // ============================================================
        // 🔹 REACT DESDE CDN
        // ============================================================
        const { useState, useEffect, useMemo, useCallback, createContext, useContext } = React;

        // ============================================================
        // 🔹 1. CONTEXTO DE DATOS (CRUD)
        // ============================================================
        const DataContext = createContext();

        const DataProvider = ({ children }) => {
            // Estado inicial con datos de ejemplo
            const [categories, setCategories] = useState([
                { id: 1, name: '🎨 Colores', icon: '🎨', lessons: 12, color: '#667eea' },
                { id: 2, name: '🔤 Vocales', icon: '🔤', lessons: 8, color: '#f093fb' },
                { id: 3, name: '📚 Abecedario', icon: '📚', lessons: 27, color: '#4facfe' },
                { id: 4, name: '🔢 Números', icon: '🔢', lessons: 20, color: '#43e97b' },
                { id: 5, name: '➕ Sumas', icon: '➕', lessons: 15, color: '#fa709a' },
                { id: 6, name: '🐶 Animales', icon: '🐶', lessons: 30, color: '#f6d365' },
            ]);

            const [lessons, setLessons] = useState([
                { id: 1, categoryId: 1, title: 'Rojo', description: 'Aprende sobre el color rojo', difficulty: 'Fácil', stars: 5 },
                { id: 2, categoryId: 1, title: 'Azul', description: 'Aprende sobre el color azul', difficulty: 'Fácil', stars: 4 },
                { id: 3, categoryId: 2, title: 'Vocal A', description: 'Aprende la vocal A', difficulty: 'Fácil', stars: 5 },
                { id: 4, categoryId: 2, title: 'Vocal E', description: 'Aprende la vocal E', difficulty: 'Intermedio', stars: 3 },
                { id: 5, categoryId: 4, title: 'Número 1', description: 'Aprende el número 1', difficulty: 'Fácil', stars: 5 },
            ]);

            const [users] = useState([
                { id: 1, name: 'Juan Pérez', email: 'juan@test.com', role: 'admin', status: 'Activo', stars: 150 },
                { id: 2, name: 'María García', email: 'maria@test.com', role: 'padre', status: 'Activo', stars: 80 },
                { id: 3, name: 'Carlos López', email: 'carlos@test.com', role: 'nino', status: 'Activo', stars: 45 },
                { id: 4, name: 'Ana Martínez', email: 'ana@test.com', role: 'nino', status: 'Suspendido', stars: 30 },
            ]);

            // CRUD para Categorías
            const addCategory = (category) => {
                const newCategory = { ...category, id: Date.now(), lessons: 0 };
                setCategories([...categories, newCategory]);
            };

            const updateCategory = (id, updatedData) => {
                setCategories(categories.map(cat => cat.id === id ? { ...cat, ...updatedData } : cat));
            };

            const deleteCategory = (id) => {
                setCategories(categories.filter(cat => cat.id !== id));
            };

            // CRUD para Lecciones
            const addLesson = (lesson) => {
                const newLesson = { ...lesson, id: Date.now() };
                setLessons([...lessons, newLesson]);
                // Actualizar contador de lecciones en categoría
                setCategories(categories.map(cat => 
                    cat.id === lesson.categoryId ? { ...cat, lessons: cat.lessons + 1 } : cat
                ));
            };

            const updateLesson = (id, updatedData) => {
                setLessons(lessons.map(lesson => lesson.id === id ? { ...lesson, ...updatedData } : lesson));
            };

            const deleteLesson = (id) => {
                const lessonToDelete = lessons.find(l => l.id === id);
                setLessons(lessons.filter(lesson => lesson.id !== id));
                if (lessonToDelete) {
                    setCategories(categories.map(cat => 
                        cat.id === lessonToDelete.categoryId ? { ...cat, lessons: Math.max(0, cat.lessons - 1) } : cat
                    ));
                }
            };

            return React.createElement(
                DataContext.Provider,
                {
                    value: {
                        categories,
                        lessons,
                        users,
                        addCategory,
                        updateCategory,
                        deleteCategory,
                        addLesson,
                        updateLesson,
                        deleteLesson
                    }
                },
                children
            );
        };

        const useData = () => useContext(DataContext);

        // ============================================================
        // 🔹 2. COMPONENTES UI PREMIUM
        // ============================================================
        const Button = ({ children, onClick, variant = 'primary', className = '', icon = null, ...props }) => {
            const variants = {
                primary: 'bg-gradient-to-r from-indigo-500 to-purple-500 text-white hover:shadow-lg hover:scale-105',
                secondary: 'bg-gradient-to-r from-pink-500 to-rose-500 text-white hover:shadow-lg hover:scale-105',
                success: 'bg-gradient-to-r from-green-400 to-emerald-500 text-white hover:shadow-lg hover:scale-105',
                danger: 'bg-gradient-to-r from-red-400 to-rose-500 text-white hover:shadow-lg hover:scale-105',
                outline: 'border-2 border-indigo-500 text-indigo-600 hover:bg-indigo-50 hover:scale-105',
                glass: 'glass text-gray-700 hover:shadow-lg hover:scale-105',
            };

            return React.createElement(
                'button',
                {
                    onClick,
                    className: `btn-premium px-6 py-3 rounded-xl font-semibold transition-all duration-300 flex items-center gap-2 ${variants[variant]} ${className}`,
                    ...props
                },
                icon && React.createElement('span', { className: 'text-lg' }, icon),
                children
            );
        };

        const Card = ({ children, className = '', variant = 'default' }) => {
            const variants = {
                default: 'bg-white rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300',
                glass: 'glass rounded-2xl shadow-xl hover:shadow-2xl transition-all duration-300',
                neumorphic: 'neumorphic transition-all duration-300 hover:shadow-2xl',
                gradient: 'gradient-animated rounded-2xl shadow-xl text-white',
            };

            return React.createElement(
                'div',
                { className: `${variants[variant]} p-6 ${className}` },
                children
            );
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;

            return React.createElement(
                'div',
                {
                    className: 'fixed inset-0 z-50 flex items-center justify-center p-4',
                    style: { background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(8px)' }
                },
                React.createElement(
                    'div',
                    { className: 'relative max-w-lg w-full' },
                    React.createElement(
                        Card,
                        { className: 'p-6 max-h-[80vh] overflow-y-auto' },
                        React.createElement(
                            'div',
                            { className: 'flex justify-between items-center mb-4' },
                            React.createElement('h2', { className: 'text-2xl font-bold text-gray-800' }, title),
                            React.createElement(
                                'button',
                                {
                                    onClick: onClose,
                                    className: 'text-gray-500 hover:text-gray-700 text-2xl transition-colors'
                                },
                                '✕'
                            )
                        ),
                        children
                    )
                )
            );
        };

        const Input = ({ label, value, onChange, type = 'text', className = '', ...props }) => {
            return React.createElement(
                'div',
                { className: `mb-4 ${className}` },
                label && React.createElement(
                    'label',
                    { className: 'block text-sm font-semibold text-gray-700 mb-2' },
                    label
                ),
                React.createElement('input', {
                    type,
                    value,
                    onChange: (e) => onChange(e.target.value),
                    className: 'w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 transition-all outline-none bg-white/50 backdrop-blur-sm',
                    ...props
                })
            );
        };

        const Select = ({ label, value, onChange, options, className = '' }) => {
            return React.createElement(
                'div',
                { className: `mb-4 ${className}` },
                label && React.createElement(
                    'label',
                    { className: 'block text-sm font-semibold text-gray-700 mb-2' },
                    label
                ),
                React.createElement(
                    'select',
                    {
                        value,
                        onChange: (e) => onChange(e.target.value),
                        className: 'w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 transition-all outline-none bg-white/50 backdrop-blur-sm'
                    },
                    options.map(opt => 
                        React.createElement('option', { key: opt.value, value: opt.value }, opt.label)
                    )
                )
            );
        };

        // ============================================================
        // 🔹 3. DASHBOARD CON GRÁFICOS Y ESTADÍSTICAS
        // ============================================================
        const DashboardStats = () => {
            const { categories, lessons, users } = useData();

            const stats = [
                { label: 'Categorías', value: categories.length, icon: 'fa-folder', color: 'from-blue-400 to-blue-600' },
                { label: 'Lecciones', value: lessons.length, icon: 'fa-book', color: 'from-purple-400 to-purple-600' },
                { label: 'Usuarios', value: users.length, icon: 'fa-users', color: 'from-green-400 to-emerald-600' },
                { label: 'Estrellas', value: users.reduce((acc, u) => acc + u.stars, 0), icon: 'fa-star', color: 'from-yellow-400 to-orange-500' },
            ];

            return React.createElement(
                'div',
                { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8' },
                stats.map((stat, index) =>
                    React.createElement(
                        Card,
                        { key: index, variant: 'glass', className: 'animate-fade-in-up' },
                        React.createElement(
                            'div',
                            { className: 'flex items-center justify-between' },
                            React.createElement(
                                'div',
                                null,
                                React.createElement('p', { className: 'text-gray-500 text-sm font-medium' }, stat.label),
                                React.createElement('p', { className: 'text-3xl font-bold text-gray-800 mt-1' }, stat.value)
                            ),
                            React.createElement(
                                'div',
                                { className: `w-14 h-14 rounded-2xl bg-gradient-to-r ${stat.color} flex items-center justify-center text-white text-2xl` },
                                React.createElement('i', { className: `fas ${stat.icon}` })
                            )
                        )
                    )
                )
            );
        };

        // ============================================================
        // 🔹 4. GESTIÓN DE CATEGORÍAS (CRUD)
        // ============================================================
        const CategoryManager = () => {
            const { categories, addCategory, updateCategory, deleteCategory } = useData();
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingCategory, setEditingCategory] = useState(null);
            const [formData, setFormData] = useState({ name: '', icon: '' });
            const [searchTerm, setSearchTerm] = useState('');

            const filteredCategories = categories.filter(cat =>
                cat.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const handleOpenModal = (category = null) => {
                if (category) {
                    setEditingCategory(category);
                    setFormData({ name: category.name, icon: category.icon });
                } else {
                    setEditingCategory(null);
                    setFormData({ name: '', icon: '' });
                }
                setIsModalOpen(true);
            };

            const handleSave = () => {
                if (!formData.name.trim()) return alert('El nombre es obligatorio');
                if (editingCategory) {
                    updateCategory(editingCategory.id, formData);
                } else {
                    addCategory(formData);
                }
                setIsModalOpen(false);
                setFormData({ name: '', icon: '' });
            };

            return React.createElement(
                'div',
                null,
                // Header con búsqueda y botón
                React.createElement(
                    'div',
                    { className: 'flex flex-wrap items-center justify-between gap-4 mb-6' },
                    React.createElement(
                        'div',
                        { className: 'flex-1 min-w-[200px]' },
                        React.createElement(Input, {
                            placeholder: '🔍 Buscar categorías...',
                            value: searchTerm,
                            onChange: setSearchTerm,
                            className: 'mb-0'
                        })
                    ),
                    React.createElement(
                        Button,
                        { onClick: () => handleOpenModal(), icon: '➕', variant: 'primary' },
                        'Nueva Categoría'
                    )
                ),
                // Grid de categorías
                React.createElement(
                    'div',
                    { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4' },
                    filteredCategories.map((category, index) =>
                        React.createElement(
                            Card,
                            { key: category.id, variant: 'glass', className: 'card-3d animate-fade-in-up' },
                            React.createElement(
                                'div',
                                { className: 'flex items-start justify-between' },
                                React.createElement(
                                    'div',
                                    { className: 'flex-1' },
                                    React.createElement(
                                        'div',
                                        { className: 'text-4xl mb-2' },
                                        category.icon || '📁'
                                    ),
                                    React.createElement('h3', { className: 'text-lg font-bold text-gray-800' }, category.name),
                                    React.createElement('p', { className: 'text-sm text-gray-500 mt-1' },
                                        `${category.lessons || 0} lecciones`
                                    )
                                ),
                                React.createElement(
                                    'div',
                                    { className: 'flex gap-2' },
                                    React.createElement(
                                        'button',
                                        {
                                            onClick: () => handleOpenModal(category),
                                            className: 'text-indigo-500 hover:text-indigo-700 transition-colors'
                                        },
                                        React.createElement('i', { className: 'fas fa-edit text-lg' })
                                    ),
                                    React.createElement(
                                        'button',
                                        {
                                            onClick: () => {
                                                if (confirm('¿Eliminar esta categoría?')) deleteCategory(category.id);
                                            },
                                            className: 'text-red-400 hover:text-red-600 transition-colors'
                                        },
                                        React.createElement('i', { className: 'fas fa-trash text-lg' })
                                    )
                                )
                            ),
                            // Progress bar
                            React.createElement(
                                'div',
                                { className: 'mt-3' },
                                React.createElement(
                                    'div',
                                    { className: 'progress-premium' },
                                    React.createElement('div', {
                                        className: 'progress-premium-fill',
                                        style: { width: `${Math.min(100, (category.lessons || 0) * 5)}%` }
                                    })
                                )
                            )
                        )
                    )
                ),
                // Modal de creación/edición
                React.createElement(
                    Modal,
                    {
                        isOpen: isModalOpen,
                        onClose: () => setIsModalOpen(false),
                        title: editingCategory ? 'Editar Categoría' : 'Nueva Categoría'
                    },
                    React.createElement(
                        'div',
                        null,
                        React.createElement(Input, {
                            label: 'Nombre de la categoría',
                            value: formData.name,
                            onChange: (val) => setFormData({ ...formData, name: val }),
                            placeholder: 'Ej: Animales'
                        }),
                        React.createElement(Input, {
                            label: 'Ícono (emojis)',
                            value: formData.icon,
                            onChange: (val) => setFormData({ ...formData, icon: val }),
                            placeholder: 'Ej: 🐶'
                        }),
                        React.createElement(
                            'div',
                            { className: 'flex gap-3 mt-4' },
                            React.createElement(
                                Button,
                                { onClick: handleSave, variant: 'primary', className: 'flex-1' },
                                editingCategory ? 'Actualizar' : 'Crear'
                            ),
                            React.createElement(
                                Button,
                                { onClick: () => setIsModalOpen(false), variant: 'outline', className: 'flex-1' },
                                'Cancelar'
                            )
                        )
                    )
                )
            );
        };

        // ============================================================
        // 🔹 5. GESTIÓN DE LECCIONES (CRUD)
        // ============================================================
        const LessonManager = () => {
            const { categories, lessons, addLesson, updateLesson, deleteLesson } = useData();
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingLesson, setEditingLesson] = useState(null);
            const [formData, setFormData] = useState({
                categoryId: '',
                title: '',
                description: '',
                difficulty: 'Fácil'
            });
            const [searchTerm, setSearchTerm] = useState('');
            const [filterCategory, setFilterCategory] = useState('');

            const filteredLessons = lessons.filter(lesson => {
                const matchSearch = lesson.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                  lesson.description.toLowerCase().includes(searchTerm.toLowerCase());
                const matchCategory = !filterCategory || lesson.categoryId === parseInt(filterCategory);
                return matchSearch && matchCategory;
            });

            const handleOpenModal = (lesson = null) => {
                if (lesson) {
                    setEditingLesson(lesson);
                    setFormData({
                        categoryId: lesson.categoryId,
                        title: lesson.title,
                        description: lesson.description,
                        difficulty: lesson.difficulty
                    });
                } else {
                    setEditingLesson(null);
                    setFormData({ categoryId: '', title: '', description: '', difficulty: 'Fácil' });
                }
                setIsModalOpen(true);
            };

            const handleSave = () => {
                if (!formData.title.trim() || !formData.categoryId) {
                    alert('Completa todos los campos');
                    return;
                }
                if (editingLesson) {
                    updateLesson(editingLesson.id, formData);
                } else {
                    addLesson(formData);
                }
                setIsModalOpen(false);
                setFormData({ categoryId: '', title: '', description: '', difficulty: 'Fácil' });
            };

            const getCategoryName = (id) => {
                const cat = categories.find(c => c.id === id);
                return cat ? cat.name : 'Sin categoría';
            };

            return React.createElement(
                'div',
                null,
                // Header con filtros
                React.createElement(
                    'div',
                    { className: 'flex flex-wrap items-center gap-4 mb-6' },
                    React.createElement(
                        'div',
                        { className: 'flex-1 min-w-[200px]' },
                        React.createElement(Input, {
                            placeholder: '🔍 Buscar lecciones...',
                            value: searchTerm,
                            onChange: setSearchTerm,
                            className: 'mb-0'
                        })
                    ),
                    React.createElement(
                        'div',
                        { className: 'min-w-[180px]' },
                        React.createElement(Select, {
                            label: null,
                            value: filterCategory,
                            onChange: setFilterCategory,
                            options: [
                                { value: '', label: '📂 Todas las categorías' },
                                ...categories.map(c => ({ value: c.id, label: c.name }))
                            ],
                            className: 'mb-0'
                        })
                    ),
                    React.createElement(
                        Button,
                        { onClick: () => handleOpenModal(), icon: '➕', variant: 'secondary' },
                        'Nueva Lección'
                    )
                ),
                // Tabla de lecciones
                React.createElement(
                    Card,
                    { variant: 'glass' },
                    React.createElement(
                        'div',
                        { className: 'overflow-x-auto' },
                        React.createElement(
                            'table',
                            { className: 'w-full' },
                            React.createElement(
                                'thead',
                                null,
                                React.createElement(
                                    'tr',
                                    { className: 'border-b border-gray-200' },
                                    React.createElement('th', { className: 'text-left py-3 px-4 text-sm font-semibold text-gray-600' }, 'Título'),
                                    React.createElement('th', { className: 'text-left py-3 px-4 text-sm font-semibold text-gray-600' }, 'Categoría'),
                                    React.createElement('th', { className: 'text-left py-3 px-4 text-sm font-semibold text-gray-600' }, 'Dificultad'),
                                    React.createElement('th', { className: 'text-left py-3 px-4 text-sm font-semibold text-gray-600' }, 'Estrellas'),
                                    React.createElement('th', { className: 'text-right py-3 px-4 text-sm font-semibold text-gray-600' }, 'Acciones')
                                )
                            ),
                            React.createElement(
                                'tbody',
                                null,
                                filteredLessons.map((lesson) =>
                                    React.createElement(
                                        'tr',
                                        { key: lesson.id, className: 'border-b border-gray-100 hover:bg-gray-50 transition-colors' },
                                        React.createElement('td', { className: 'py-3 px-4 font-medium text-gray-800' }, lesson.title),
                                        React.createElement('td', { className: 'py-3 px-4 text-gray-600' },
                                            React.createElement('span', { className: 'badge-premium' }, getCategoryName(lesson.categoryId))
                                        ),
                                        React.createElement('td', { className: 'py-3 px-4' },
                                            React.createElement('span', {
                                                className: `px-3 py-1 rounded-full text-xs font-bold ${
                                                    lesson.difficulty === 'Fácil' ? 'bg-green-100 text-green-700' :
                                                    lesson.difficulty === 'Intermedio' ? 'bg-yellow-100 text-yellow-700' :
                                                    'bg-red-100 text-red-700'
                                                }`
                                            }, lesson.difficulty)
                                        ),
                                        React.createElement('td', { className: 'py-3 px-4 text-yellow-500' },
                                            '⭐'.repeat(lesson.stars || 0)
                                        ),
                                        React.createElement('td', { className: 'py-3 px-4 text-right' },
                                            React.createElement(
                                                'button',
                                                {
                                                    onClick: () => handleOpenModal(lesson),
                                                    className: 'text-indigo-500 hover:text-indigo-700 mr-3 transition-colors'
                                                },
                                                React.createElement('i', { className: 'fas fa-edit' })
                                            ),
                                            React.createElement(
                                                'button',
                                                {
                                                    onClick: () => {
                                                        if (confirm('¿Eliminar esta lección?')) deleteLesson(lesson.id);
                                                    },
                                                    className: 'text-red-400 hover:text-red-600 transition-colors'
                                                },
                                                React.createElement('i', { className: 'fas fa-trash' })
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    ),
                    React.createElement(
                        'div',
                        { className: 'mt-4 text-sm text-gray-500 text-center' },
                        `Mostrando ${filteredLessons.length} de ${lessons.length} lecciones`
                    )
                ),
                // Modal
                React.createElement(
                    Modal,
                    {
                        isOpen: isModalOpen,
                        onClose: () => setIsModalOpen(false),
                        title: editingLesson ? 'Editar Lección' : 'Nueva Lección'
                    },
                    React.createElement(
                        'div',
                        null,
                        React.createElement(Select, {
                            label: 'Categoría',
                            value: formData.categoryId,
                            onChange: (val) => setFormData({ ...formData, categoryId: parseInt(val) }),
                            options: [
                                { value: '', label: 'Selecciona una categoría' },
                                ...categories.map(c => ({ value: c.id, label: c.name }))
                            ]
                        }),
                        React.createElement(Input, {
                            label: 'Título',
                            value: formData.title,
                            onChange: (val) => setFormData({ ...formData, title: val }),
                            placeholder: 'Ej: Aprendiendo la vocal A'
                        }),
                        React.createElement(Input, {
                            label: 'Descripción',
                            value: formData.description,
                            onChange: (val) => setFormData({ ...formData, description: val }),
                            placeholder: 'Breve descripción de la lección'
                        }),
                        React.createElement(Select, {
                            label: 'Dificultad',
                            value: formData.difficulty,
                            onChange: (val) => setFormData({ ...formData, difficulty: val }),
                            options: [
                                { value: 'Fácil', label: '🟢 Fácil' },
                                { value: 'Intermedio', label: '🟡 Intermedio' },
                                { value: 'Avanzado', label: '🔴 Avanzado' }
                            ]
                        }),
                        React.createElement(
                            'div',
                            { className: 'flex gap-3 mt-4' },
                            React.createElement(
                                Button,
                                { onClick: handleSave, variant: 'primary', className: 'flex-1' },
                                editingLesson ? 'Actualizar' : 'Crear'
                            ),
                            React.createElement(
                                Button,
                                { onClick: () => setIsModalOpen(false), variant: 'outline', className: 'flex-1' },
                                'Cancelar'
                            )
                        )
                    )
                )
            );
        };

        // ============================================================
        // 🔹 6. GESTIÓN DE USUARIOS
        // ============================================================
        const UserManager = () => {
            const { users } = useData();
            const [searchTerm, setSearchTerm] = useState('');
            const [filterRole, setFilterRole] = useState('');

            const filteredUsers = users.filter(user => {
                const matchSearch = user.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                  user.email.toLowerCase().includes(searchTerm.toLowerCase());
                const matchRole = !filterRole || user.role === filterRole;
                return matchSearch && matchRole;
            });

            return React.createElement(
                'div',
                null,
                React.createElement(
                    'div',
                    { className: 'flex flex-wrap items-center gap-4 mb-6' },
                    React.createElement(
                        'div',
                        { className: 'flex-1 min-w-[200px]' },
                        React.createElement(Input, {
                            placeholder: '🔍 Buscar usuarios...',
                            value: searchTerm,
                            onChange: setSearchTerm,
                            className: 'mb-0'
                        })
                    ),
                    React.createElement(
                        'div',
                        { className: 'min-w-[150px]' },
                        React.createElement(Select, {
                            label: null,
                            value: filterRole,
                            onChange: setFilterRole,
                            options: [
                                { value: '', label: 'Todos los roles' },
                                { value: 'admin', label: 'Admin' },
                                { value: 'padre', label: 'Padre' },
                                { value: 'nino', label: 'Niño' }
                            ],
                            className: 'mb-0'
                        })
                    )
                ),
                React.createElement(
                    Card,
                    { variant: 'glass' },
                    React.createElement(
                        'div',
                        { className: 'space-y-4' },
                        filteredUsers.map((user) =>
                            React.createElement(
                                'div',
                                { key: user.id, className: 'flex items-center justify-between p-4 bg-white/50 rounded-xl hover:bg-white/80 transition-all' },
                                React.createElement(
                                    'div',
                                    { className: 'flex items-center gap-4' },
                                    React.createElement(
                                        'div',
                                        { className: 'w-12 h-12 rounded-full bg-gradient-to-r from-indigo-400 to-purple-400 flex items-center justify-center text-white text-xl font-bold' },
                                        user.name.charAt(0)
                                    ),
                                    React.createElement(
                                        'div',
                                        null,
                                        React.createElement('p', { className: 'font-semibold text-gray-800' }, user.name),
                                        React.createElement('p', { className: 'text-sm text-gray-500' }, user.email)
                                    )
                                ),
                                React.createElement(
                                    'div',
                                    { className: 'flex items-center gap-4' },
                                    React.createElement('span', {
                                        className: `px-3 py-1 rounded-full text-xs font-bold ${
                                            user.status === 'Activo' ? 'bg-green-100 text-green-700' :
                                            'bg-red-100 text-red-700'
                                        }`
                                    }, user.status),
                                    React.createElement('span', { className: 'text-yellow-500' }, '⭐ ', user.stars),
                                    React.createElement('span', { className: 'badge-premium' }, user.role)
                                )
                            )
                        )
                    )
                )
            );
        };

        // ============================================================
        // 🔹 7. NAVEGACIÓN PRINCIPAL
        // ============================================================
        const Navigation = ({ currentView, setCurrentView }) => {
            const views = [
                { id: 'dashboard', label: 'Dashboard', icon: 'fa-chart-pie' },
                { id: 'categories', label: 'Categorías', icon: 'fa-folder' },
                { id: 'lessons', label: 'Lecciones', icon: 'fa-book' },
                { id: 'users', label: 'Usuarios', icon: 'fa-users' },
            ];

            return React.createElement(
                'nav',
                { className: 'flex gap-2 mb-8 flex-wrap' },
                views.map(view =>
                    React.createElement(
                        'button',
                        {
                            key: view.id,
                            onClick: () => setCurrentView(view.id),
                            className: `px-6 py-3 rounded-xl font-semibold transition-all flex items-center gap-2 ${
                                currentView === view.id
                                    ? 'bg-gradient-to-r from-indigo-500 to-purple-500 text-white shadow-lg scale-105'
                                    : 'bg-white/50 text-gray-600 hover:bg-white/80 hover:shadow-md'
                            }`
                        },
                        React.createElement('i', { className: `fas ${view.icon}` }),
                        view.label
                    )
                )
            );
        };

        // ============================================================
        // 🔹 8. APP PRINCIPAL (CON LOGIN Y DASHBOARD)
        // ============================================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [isLogin, setIsLogin] = useState(true);

            useEffect(() => {
                const storedUser = localStorage.getItem('ciborg_user');
                if (storedUser) {
                    setUser(JSON.parse(storedUser));
                }
            }, []);

            const handleLogin = (email, password) => {
                const isAdmin = email.includes('admin');
                const newUser = {
                    name: isAdmin ? 'Administrador' : 'Juanito',
                    role: isAdmin ? 'admin' : 'nino',
                    email: email,
                };
                setUser(newUser);
                localStorage.setItem('ciborg_user', JSON.stringify(newUser));
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('ciborg_user');
                setCurrentView('dashboard');
            };

            // Login Screen
            if (!user) {
                return React.createElement(LoginScreen, { onLogin: handleLogin });
            }

            // Admin Dashboard
            if (user.role === 'admin') {
                return React.createElement(
                    DataProvider,
                    null,
                    React.createElement(
                        'div',
                        { className: 'min-h-screen p-4 md:p-8' },
                        React.createElement(
                            'div',
                            { className: 'max-w-7xl mx-auto' },
                            // Header
                            React.createElement(
                                'header',
                                { className: 'flex flex-wrap items-center justify-between gap-4 mb-8' },
                                React.createElement(
                                    'div',
                                    { className: 'flex items-center gap-4' },
                                    React.createElement('div', { className: 'text-4xl' }, '🚀'),
                                    React.createElement('div', null,
                                        React.createElement('h1', { className: 'text-3xl font-bold gradient-animated text-transparent bg-clip-text' }, 'Ciborg Kids'),
                                        React.createElement('p', { className: 'text-gray-500 text-sm' }, 'Panel de Administración Premium')
                                    )
                                ),
                                React.createElement(
                                    'div',
                                    { className: 'flex items-center gap-4' },
                                    React.createElement('span', { className: 'text-gray-600' }, '👋 ', user.name),
                                    React.createElement(
                                        'button',
                                        {
                                            onClick: handleLogout,
                                            className: 'px-4 py-2 rounded-xl bg-red-500 text-white hover:bg-red-600 transition-all'
                                        },
                                        'Cerrar Sesión'
                                    )
                                )
                            ),
                            // Navigation
                            React.createElement(Navigation, { currentView, setCurrentView }),
                            // Content
                            React.createElement(
                                'div',
                                { className: 'animate-fade-in-up' },
                                currentView === 'dashboard' && React.createElement(DashboardStats, null),
                                currentView === 'categories' && React.createElement(CategoryManager, null),
                                currentView === 'lessons' && React.createElement(LessonManager, null),
                                currentView === 'users' && React.createElement(UserManager, null)
                            )
                        )
                    )
                );
            }

            // Child Dashboard
            return React.createElement(
                ChildDashboard,
                { user }
            );
        };

        // ============================================================
        // 🔹 9. PANTALLA DE LOGIN
        // ============================================================
        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');
                if (!email || !password) {
                    setError('Completa todos los campos');
                    return;
                }
                onLogin(email, password);
            };

            return React.createElement(
                'div',
                { className: 'min-h-screen flex items-center justify-center p-4 gradient-animated' },
                React.createElement(
                    Card,
                    { variant: 'glass', className: 'max-w-md w-full p-8 animate-fade-in-up' },
                    React.createElement(
                        'div',
                        { className: 'text-center mb-8' },
                        React.createElement('div', { className: 'text-6xl mb-4 float-animation' }, '🚀'),
                        React.createElement('h2', { className: 'text-3xl font-bold text-gray-800' }, 'Ciborg Kids'),
                        React.createElement('p', { className: 'text-gray-500 mt-2' }, 'Plataforma educativa premium')
                    ),
                    error && React.createElement(
                        'div',
                        { className: 'bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4' },
                        error
                    ),
                    React.createElement(
                        'form',
                        { onSubmit: handleSubmit, className: 'space-y-4' },
                        React.createElement(Input, {
                            label: 'Correo electrónico',
                            type: 'email',
                            value: email,
                            onChange: setEmail,
                            placeholder: 'admin@test.com'
                        }),
                        React.createElement(Input, {
                            label: 'Contraseña',
                            type: 'password',
                            value: password,
                            onChange: setPassword,
                            placeholder: '••••••••'
                        }),
                        React.createElement(
                            Button,
                            { type: 'submit', variant: 'primary', className: 'w-full text-lg' },
                            'Iniciar Sesión'
                        )
                    ),
                    React.createElement(
                        'div',
                        { className: 'mt-6 text-center text-sm text-gray-500' },
                        'Demo: ',
                        React.createElement('span', { className: 'font-mono bg-gray-100 px-2 py-1 rounded' }, 'admin@test.com'),
                        ' (Admin)'
                    )
                )
            );
        };

        // ============================================================
        // 🔹 10. DASHBOARD DEL NIÑO
        // ============================================================
        const ChildDashboard = ({ user }) => {
            const categories = [
                { name: 'Colores', icon: '🎨', progress: 75 },
                { name: 'Vocales', icon: '🔤', progress: 60 },
                { name: 'Abecedario', icon: '📚', progress: 40 },
                { name: 'Números', icon: '🔢', progress: 85 },
                { name: 'Sumas', icon: '➕', progress: 30 },
                { name: 'Animales', icon: '🐶', progress: 90 },
            ];

            return React.createElement(
                'div',
                { className: 'min-h-screen p-4 md:p-8' },
                React.createElement(
                    'div',
                    { className: 'max-w-6xl mx-auto' },
                    // Header
                    React.createElement(
                        'header',
                        { className: 'flex flex-wrap items-center justify-between gap-4 mb-8' },
                        React.createElement(
                            'div',
                            { className: 'flex items-center gap-4' },
                            React.createElement('span', { className: 'text-5xl' }, '👦'),
                            React.createElement('div', null,
                                React.createElement('h1', { className: 'text-3xl font-bold text-gray-800' }, `¡Hola ${user.name}!`),
                                React.createElement('p', { className: 'text-gray-500' }, '¡Sigue aprendiendo y divirtiéndote!')
                            )
                        ),
                        React.createElement(
                            'button',
                            {
                                onClick: () => {
                                    localStorage.removeItem('ciborg_user');
                                    window.location.reload();
                                },
                                className: 'px-4 py-2 rounded-xl bg-red-500 text-white hover:bg-red-600 transition-all'
                            },
                            'Salir'
                        )
                    ),
                    // Stats
                    React.createElement(
                        'div',
                        { className: 'grid grid-cols-2 md:grid-cols-4 gap-4 mb-8' },
                        [
                            { label: 'Estrellas', value: 25, icon: '⭐' },
                            { label: 'Medallas', value: 3, icon: '🏅' },
                            { label: 'Lecciones', value: '8/20', icon: '📚' },
                            { label: 'Nivel', value: 3, icon: '🎯' },
                        ].map((stat, i) =>
                            React.createElement(
                                Card,
                                { key: i, variant: 'glass', className: 'text-center' },
                                React.createElement('div', { className: 'text-3xl mb-2' }, stat.icon),
                                React.createElement('div', { className: 'text-2xl font-bold text-indigo-600' }, stat.value),
                                React.createElement('div', { className: 'text-sm text-gray-500' }, stat.label)
                            )
                        )
                    ),
                    // Categorías
                    React.createElement(
                        'h2',
                        { className: 'text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2' },
                        '📚 Categorías para aprender'
                    ),
                    React.createElement(
                        'div',
                        { className: 'grid grid-cols-2 md:grid-cols-3 gap-4' },
                        categories.map((cat, i) =>
                            React.createElement(
                                Card,
                                { key: i, variant: 'neumorphic', className: 'animate-fade-in-up' },
                                React.createElement(
                                    'div',
                                    { className: 'text-center' },
                                    React.createElement('div', { className: 'text-5xl mb-3' }, cat.icon),
                                    React.createElement('h3', { className: 'font-bold text-gray-800' }, cat.name),
                                    React.createElement(
                                        'div',
                                        { className: 'mt-3' },
                                        React.createElement(
                                            'div',
                                            { className: 'progress-premium' },
                                            React.createElement('div', {
                                                className: 'progress-premium-fill',
                                                style: { width: `${cat.progress}%` }
                                            })
                                        ),
                                        React.createElement('p', { className: 'text-sm text-gray-500 mt-1' }, `${cat.progress}% completado`)
                                    )
                                )
                            )
                        )
                    )
                )
            );
        };

        // ============================================================
        // 🔹 11. RENDERIZADO FINAL
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App, null));
    </script>
</body>
</html>
