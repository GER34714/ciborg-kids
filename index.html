<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciborg Kids - Aprende Jugando</title>
    
    <!-- ✅ Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ✅ React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float-animation { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // ============================================================
        // 🔹 OBTENER REACT DEL GLOBAL
        // ============================================================
        const { useState, useEffect } = React;

        // ============================================================
        // 🔹 1. COMPONENTES UI
        // ============================================================
        const Button = ({ children, onClick, variant = 'primary', className = '' }) => {
            const variants = {
                primary: 'bg-indigo-600 hover:bg-indigo-700 text-white',
                secondary: 'bg-yellow-500 hover:bg-yellow-600 text-white',
                outline: 'border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50'
            };
            return React.createElement(
                'button',
                {
                    onClick,
                    className: `px-6 py-3 rounded-full font-semibold shadow-lg transition-all ${variants[variant]} ${className}`
                },
                children
            );
        };

        const Card = ({ children, className = '' }) => {
            return React.createElement(
                'div',
                { className: `bg-white rounded-2xl shadow-xl p-6 hover:shadow-2xl transition-all ${className}` },
                children
            );
        };

        // ============================================================
        // 🔹 2. PÁGINA DE LOGIN
        // ============================================================
        const Login = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');
                if (!email || !password) {
                    setError('Por favor completa todos los campos');
                    return;
                }
                onLogin(email);
            };

            return React.createElement(
                'div',
                { className: 'max-w-md mx-auto mt-10' },
                React.createElement(
                    Card,
                    { className: 'p-8' },
                    React.createElement(
                        'div',
                        { className: 'text-center mb-8' },
                        React.createElement('span', { className: 'text-6xl float-animation block mb-4' }, '🎒'),
                        React.createElement('h2', { className: 'text-3xl font-bold text-indigo-600' }, '¡Bienvenido!'),
                        React.createElement('p', { className: 'text-gray-600 mt-2' }, 'Ingresa para seguir aprendiendo')
                    ),
                    error && React.createElement(
                        'div',
                        { className: 'bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4' },
                        error
                    ),
                    React.createElement(
                        'form',
                        { onSubmit: handleSubmit, className: 'space-y-4' },
                        React.createElement(
                            'div',
                            null,
                            React.createElement('label', { className: 'block text-gray-700 font-medium mb-2' }, 'Correo electrónico'),
                            React.createElement('input', {
                                type: 'email',
                                value: email,
                                onChange: (e) => setEmail(e.target.value),
                                className: 'w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500',
                                placeholder: 'admin@test.com',
                                required: true
                            })
                        ),
                        React.createElement(
                            'div',
                            null,
                            React.createElement('label', { className: 'block text-gray-700 font-medium mb-2' }, 'Contraseña'),
                            React.createElement('input', {
                                type: 'password',
                                value: password,
                                onChange: (e) => setPassword(e.target.value),
                                className: 'w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500',
                                placeholder: '••••••••',
                                required: true
                            })
                        ),
                        React.createElement(Button, { type: 'submit', variant: 'primary', className: 'w-full text-lg' }, '🚀 Entrar')
                    ),
                    React.createElement(
                        'div',
                        { className: 'mt-6 text-center text-sm text-gray-600' },
                        React.createElement('p', { className: 'font-semibold' }, 'Credenciales de prueba:'),
                        React.createElement('p', { className: 'text-xs mt-1' }, '📧 ', React.createElement('span', { className: 'font-mono' }, 'admin@test.com'), ' (Admin)'),
                        React.createElement('p', { className: 'text-xs' }, '📧 ', React.createElement('span', { className: 'font-mono' }, 'nino@test.com'), ' (Niño)'),
                        React.createElement('p', { className: 'text-xs text-gray-400 mt-2' }, 'Cualquier contraseña funciona')
                    )
                )
            );
        };

        // ============================================================
        // 🔹 3. DASHBOARD DEL NIÑO
        // ============================================================
        const DashboardChild = ({ user }) => {
            const categories = [
                '🎨 Colores', '🔤 Vocales', '📚 Abecedario', '🔢 Números',
                '➕ Sumas', '➖ Restas', '📖 Lectura', '🇪🇸 Español',
                '🇬🇧 Inglés', '🎮 Juegos', '📖 Cuentos', '🎨 Dibujos'
            ];

            const stats = [
                { icon: '⭐', label: 'Estrellas', value: user?.stars || 25 },
                { icon: '🏅', label: 'Medallas', value: user?.medals || 3 },
                { icon: '📚', label: 'Lecciones', value: '8 de 20' },
                { icon: '🎯', label: 'Nivel', value: user?.level || 3 },
            ];

            return React.createElement(
                'div',
                { className: 'space-y-8' },
                React.createElement(
                    'div',
                    { className: 'bg-gradient-to-r from-indigo-500 to-purple-500 rounded-3xl p-8 text-white shadow-xl' },
                    React.createElement(
                        'div',
                        { className: 'flex items-center space-x-4' },
                        React.createElement('span', { className: 'text-6xl' }, user?.avatar || '👦'),
                        React.createElement(
                            'div',
                            null,
                            React.createElement('h1', { className: 'text-3xl font-bold' }, `¡Hola ${user?.name || 'Juanito'}! 👋`),
                            React.createElement('p', { className: 'text-indigo-100 mt-1' }, '¡Sigue aprendiendo y divirtiéndote!')
                        )
                    )
                ),
                React.createElement(
                    'div',
                    { className: 'grid grid-cols-2 md:grid-cols-4 gap-4' },
                    stats.map((stat, index) =>
                        React.createElement(
                            Card,
                            { key: index, className: 'text-center' },
                            React.createElement('div', { className: 'text-4xl mb-2' }, stat.icon),
                            React.createElement('div', { className: 'text-2xl font-bold text-indigo-600' }, stat.value),
                            React.createElement('div', { className: 'text-gray-600 text-sm' }, stat.label)
                        )
                    )
                ),
                React.createElement(
                    'div',
                    null,
                    React.createElement(
                        'h2',
                        { className: 'text-2xl font-bold text-gray-800 mb-4 flex items-center' },
                        React.createElement('span', { className: 'mr-2' }, '📚'),
                        'Categorías para aprender'
                    ),
                    React.createElement(
                        'div',
                        { className: 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4' },
                        categories.map((category, index) =>
                            React.createElement(
                                'div',
                                {
                                    key: index,
                                    className: 'bg-white rounded-2xl p-4 shadow-md hover:shadow-xl cursor-pointer transition-all text-center border-2 border-transparent hover:border-indigo-300'
                                },
                                React.createElement('div', { className: 'text-3xl mb-2' }, category.split(' ')[0]),
                                React.createElement('div', { className: 'font-medium text-gray-700' }, category.split(' ').slice(1).join(' '))
                            )
                        )
                    )
                ),
                React.createElement(
                    'div',
                    { className: 'bg-gradient-to-r from-yellow-400 to-orange-400 rounded-2xl p-6 text-white shadow-lg text-center' },
                    React.createElement('p', { className: 'text-xl font-bold' }, '🌟 ¡Sigue así! Cada día aprendes algo nuevo 🌟')
                )
            );
        };

        // ============================================================
        // 🔹 4. DASHBOARD DEL ADMIN
        // ============================================================
        const DashboardAdmin = () => {
            const stats = [
                { label: 'Usuarios', value: '156', icon: '👥', color: 'from-blue-500 to-blue-600' },
                { label: 'Contenido', value: '342', icon: '📚', color: 'from-green-500 to-green-600' },
                { label: 'Membresías', value: '89', icon: '💳', color: 'from-purple-500 to-purple-600' },
                { label: 'Estrellas', value: '1,247', icon: '⭐', color: 'from-yellow-500 to-yellow-600' },
            ];

            const menuItems = [
                '👤 Usuarios', '📂 Categorías', '📝 Contenido', '🎮 Juegos',
                '📖 Cuentos', '🎵 Audios', '🎬 Videos', '🖼️ Imágenes',
                '📊 Quiz', '📈 Reportes', '⚙️ Configuración', '💎 Membresías'
            ];

            return React.createElement(
                'div',
                { className: 'space-y-6' },
                React.createElement(
                    'div',
                    { className: 'flex flex-wrap justify-between items-center gap-4' },
                    React.createElement(
                        'h1',
                        { className: 'text-3xl font-bold text-gray-800 flex items-center' },
                        React.createElement('span', { className: 'mr-3' }, '🛠️'),
                        'Panel de Administración'
                    ),
                    React.createElement('span', { className: 'bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full text-sm font-bold' }, 'Admin')
                ),
                React.createElement(
                    'div',
                    { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4' },
                    stats.map((stat, index) =>
                        React.createElement(
                            Card,
                            { key: index, className: `bg-gradient-to-r ${stat.color} text-white` },
                            React.createElement(
                                'div',
                                { className: 'flex items-center justify-between' },
                                React.createElement(
                                    'div',
                                    null,
                                    React.createElement('div', { className: 'text-3xl font-bold' }, stat.value),
                                    React.createElement('div', { className: 'text-sm opacity-90' }, stat.label)
                                ),
                                React.createElement('span', { className: 'text-4xl' }, stat.icon)
                            )
                        )
                    )
                ),
                React.createElement(
                    Card,
                    null,
                    React.createElement('h2', { className: 'text-xl font-bold text-gray-800 mb-4' }, '🔧 Gestión del Sistema'),
                    React.createElement(
                        'div',
                        { className: 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3' },
                        menuItems.map((item, index) =>
                            React.createElement(
                                'div',
                                {
                                    key: index,
                                    className: 'bg-gray-50 hover:bg-indigo-50 rounded-xl p-4 cursor-pointer transition-all border-2 border-transparent hover:border-indigo-300 text-center'
                                },
                                React.createElement('div', { className: 'text-3xl mb-1' }, item.split(' ')[0]),
                                React.createElement('div', { className: 'font-medium text-sm text-gray-700' }, item.split(' ').slice(1).join(' '))
                            )
                        )
                    )
                ),
                React.createElement(
                    'div',
                    { className: 'grid grid-cols-1 sm:grid-cols-2 gap-4' },
                    React.createElement(Button, { variant: 'secondary', className: 'w-full' }, '➕ Nueva Categoría'),
                    React.createElement(Button, { variant: 'primary', className: 'w-full' }, '📝 Nuevo Contenido')
                )
            );
        };

        // ============================================================
        // 🔹 5. APP PRINCIPAL
        // ============================================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [currentPage, setCurrentPage] = useState('login');

            useEffect(() => {
                const storedUser = localStorage.getItem('ciborg_user');
                if (storedUser) {
                    const parsedUser = JSON.parse(storedUser);
                    setUser(parsedUser);
                    setCurrentPage(parsedUser.role === 'admin' ? 'admin' : 'child');
                }
            }, []);

            const handleLogin = (email) => {
                const isAdmin = email.includes('admin');
                const newUser = {
                    name: isAdmin ? 'Administrador' : 'Juanito',
                    role: isAdmin ? 'admin' : 'nino',
                    avatar: isAdmin ? '🛠️' : '👦',
                    stars: 25,
                    medals: 3,
                    level: 3,
                };
                setUser(newUser);
                localStorage.setItem('ciborg_user', JSON.stringify(newUser));
                setCurrentPage(isAdmin ? 'admin' : 'child');
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('ciborg_user');
                setCurrentPage('login');
            };

            if (currentPage === 'login') {
                return React.createElement(
                    React.Fragment,
                    null,
                    React.createElement(
                        'div',
                        { className: 'min-h-screen' },
                        React.createElement(Login, { onLogin: handleLogin })
                    )
                );
            }

            // Layout con header
            return React.createElement(
                'div',
                { className: 'min-h-screen flex flex-col' },
                React.createElement(
                    'header',
                    { className: 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-2xl' },
                    React.createElement(
                        'div',
                        { className: 'container mx-auto px-4 py-4 flex flex-wrap justify-between items-center' },
                        React.createElement(
                            'div',
                            { className: 'flex items-center space-x-3 cursor-pointer', onClick: () => setCurrentPage(user?.role === 'admin' ? 'admin' : 'child') },
                            React.createElement('span', { className: 'text-3xl float-animation' }, '🚀'),
                            React.createElement('span', { className: 'text-2xl font-extrabold tracking-tight' }, 'Ciborg Kids')
                        ),
                        React.createElement(
                            'div',
                            { className: 'flex items-center space-x-4' },
                            React.createElement(
                                'span',
                                { className: 'flex items-center space-x-2' },
                                React.createElement('span', { className: 'text-2xl' }, user?.avatar || '👤'),
                                React.createElement('span', { className: 'font-medium hidden sm:inline' }, user?.name),
                                user?.role === 'admin' && React.createElement('span', { className: 'bg-yellow-400 text-gray-800 text-xs px-2 py-1 rounded-full font-bold' }, 'Admin')
                            ),
                            React.createElement(
                                'button',
                                {
                                    onClick: handleLogout,
                                    className: 'bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full transition-all text-sm font-semibold'
                                },
                                'Salir'
                            )
                        )
                    )
                ),
                React.createElement(
                    'main',
                    { className: 'flex-grow container mx-auto px-4 py-8' },
                    currentPage === 'child' && React.createElement(DashboardChild, { user }),
                    currentPage === 'admin' && React.createElement(DashboardAdmin, null)
                ),
                React.createElement(
                    'footer',
                    { className: 'bg-white/80 backdrop-blur-sm border-t border-gray-200 py-4' },
                    React.createElement(
                        'div',
                        { className: 'container mx-auto px-4 text-center text-gray-600 text-sm' },
                        '© 2026 Ciborg Kids - Aprende Jugando. Todos los derechos reservados.'
                    )
                )
            );
        };

        // ============================================================
        // 🔹 6. RENDERIZADO
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App, null));
    </script>
</body>
</html>
