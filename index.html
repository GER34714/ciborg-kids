<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciborg Kids - Juegos Educativos</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float-animation { animation: float 3s ease-in-out infinite; }

        @keyframes bounce-in {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .bounce-in { animation: bounce-in 0.5s ease forwards; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.5s ease; }

        @keyframes sparkle {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .sparkle { animation: sparkle 0.5s ease 3; }

        .game-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .memory-card {
            width: 80px;
            height: 80px;
            perspective: 1000px;
            cursor: pointer;
        }
        .memory-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .memory-card.flipped .memory-card-inner {
            transform: rotateY(180deg);
        }
        .memory-card-front, .memory-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 2px solid #e5e7eb;
        }
        .memory-card-front {
            background: white;
            transform: rotateY(180deg);
        }
        .memory-card-back {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-size: 1.5rem;
        }
        .memory-card.matched .memory-card-front {
            border-color: #10b981;
            background: #d1fae5;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-premium {
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .progress-bar {
            height: 8px;
            border-radius: 10px;
            background: #e5e7eb;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #4f46e5, #7c3aed, #ec4899);
            transition: width 1s ease;
        }

        .star-rating {
            color: #fbbf24;
            font-size: 1.5rem;
        }

        .badge-premium {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .modal-overlay {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .slide-in { animation: slideIn 0.3s ease forwards; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #4f46e5, #7c3aed); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // ============================================================
        // 🔹 REACT
        // ============================================================
        const { useState, useEffect, useMemo, createContext, useContext } = React;

        // ============================================================
        // 🔹 1. CONTEXTO DEL NIÑO
        // ============================================================
        const ChildContext = createContext();

        const ChildProvider = ({ children }) => {
            const [stars, setStars] = useState(25);
            const [medals, setMedals] = useState(3);
            const [level, setLevel] = useState(3);
            const [completedLessons, setCompletedLessons] = useState([]);
            const [gameHistory, setGameHistory] = useState([]);

            const addStars = (amount) => {
                setStars(prev => prev + amount);
                // Cada 50 estrellas = 1 medalla
                if (stars + amount >= 50) {
                    setMedals(prev => prev + 1);
                    setStars(prev => prev - 50);
                }
            };

            const completeLesson = (lessonId) => {
                if (!completedLessons.includes(lessonId)) {
                    setCompletedLessons([...completedLessons, lessonId]);
                    addStars(5);
                }
            };

            const addGameResult = (gameName, score) => {
                setGameHistory([...gameHistory, { gameName, score, date: new Date().toISOString() }]);
                addStars(score);
            };

            return React.createElement(
                ChildContext.Provider,
                {
                    value: {
                        stars,
                        medals,
                        level,
                        completedLessons,
                        gameHistory,
                        addStars,
                        completeLesson,
                        addGameResult,
                        setLevel
                    }
                },
                children
            );
        };

        const useChild = () => useContext(ChildContext);

        // ============================================================
        // 🔹 2. DATOS DE CONTENIDO
        // ============================================================
        const ContentContext = createContext();

        const ContentProvider = ({ children }) => {
            const [categories, setCategories] = useState([
                { id: 1, name: 'Colores', icon: '🎨', color: '#667eea' },
                { id: 2, name: 'Vocales', icon: '🔤', color: '#f093fb' },
                { id: 3, name: 'Números', icon: '🔢', color: '#43e97b' },
                { id: 4, name: 'Animales', icon: '🐶', color: '#f6d365' },
            ]);

            const [lessons, setLessons] = useState([
                { id: 1, categoryId: 1, title: 'El color Rojo', description: 'Aprende sobre el color rojo', difficulty: 'Fácil', image: '🔴' },
                { id: 2, categoryId: 1, title: 'El color Azul', description: 'Aprende sobre el color azul', difficulty: 'Fácil', image: '🔵' },
                { id: 3, categoryId: 2, title: 'Vocal A', description: 'Aprende la vocal A', difficulty: 'Fácil', image: '🅰️' },
                { id: 4, categoryId: 2, title: 'Vocal E', description: 'Aprende la vocal E', difficulty: 'Fácil', image: '🅴' },
                { id: 5, categoryId: 3, title: 'Número 1', description: 'Aprende el número 1', difficulty: 'Fácil', image: '1️⃣' },
                { id: 6, categoryId: 3, title: 'Número 2', description: 'Aprende el número 2', difficulty: 'Fácil', image: '2️⃣' },
                { id: 7, categoryId: 4, title: 'El Perro', description: 'Conoce al perro', difficulty: 'Fácil', image: '🐕' },
                { id: 8, categoryId: 4, title: 'El Gato', description: 'Conoce al gato', difficulty: 'Fácil', image: '🐈' },
            ]);

            return React.createElement(
                ContentContext.Provider,
                { value: { categories, lessons } },
                children
            );
        };

        const useContent = () => useContext(ContentContext);

        // ============================================================
        // 🔹 3. JUEGO DE MEMORIA
        // ============================================================
        const MemoryGame = ({ onComplete }) => {
            const emojis = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼'];
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [matched, setMatched] = useState([]);
            const [moves, setMoves] = useState(0);

            useEffect(() => {
                const shuffled = [...emojis, ...emojis]
                    .sort(() => Math.random() - 0.5)
                    .map((emoji, index) => ({ id: index, emoji, matched: false }));
                setCards(shuffled);
            }, []);

            const handleCardClick = (index) => {
                if (flipped.length === 2) return;
                if (flipped.includes(index)) return;
                if (matched.includes(index)) return;

                const newFlipped = [...flipped, index];
                setFlipped(newFlipped);

                if (newFlipped.length === 2) {
                    setMoves(moves + 1);
                    const [first, second] = newFlipped;
                    if (cards[first].emoji === cards[second].emoji) {
                        setMatched([...matched, first, second]);
                        setFlipped([]);
                        if (matched.length + 2 === cards.length) {
                            const score = Math.max(10, 20 - moves);
                            onComplete('Memoria', score);
                        }
                    } else {
                        setTimeout(() => setFlipped([]), 1000);
                    }
                }
            };

            const getCardClass = (index) => {
                let classes = 'memory-card';
                if (flipped.includes(index) || matched.includes(index)) classes += ' flipped';
                if (matched.includes(index)) classes += ' matched';
                return classes;
            };

            return React.createElement(
                'div',
                { className: 'p-6' },
                React.createElement(
                    'div',
                    { className: 'flex justify-between items-center mb-4' },
                    React.createElement('h3', { className: 'text-xl font-bold text-gray-800' }, '🧠 Juego de Memoria'),
                    React.createElement('p', { className: 'text-gray-600' }, `Movimientos: ${moves}`)
                ),
                React.createElement(
                    'div',
                    { className: 'grid grid-cols-4 gap-3 max-w-md mx-auto' },
                    cards.map((card, index) =>
                        React.createElement(
                            'div',
                            {
                                key: index,
                                className: getCardClass(index),
                                onClick: () => handleCardClick(index)
                            },
                            React.createElement(
                                'div',
                                { className: 'memory-card-inner' },
                                React.createElement('div', { className: 'memory-card-front' }, card.emoji),
                                React.createElement('div', { className: 'memory-card-back' }, '?')
                            )
                        )
                    )
                ),
                matched.length === cards.length && React.createElement(
                    'div',
                    { className: 'text-center mt-4 text-green-600 font-bold text-xl bounce-in' },
                    '🎉 ¡Completaste el juego!'
                )
            );
        };

        // ============================================================
        // 🔹 4. JUEGO DE RELACIONAR
        // ============================================================
        const MatchingGame = ({ onComplete }) => {
            const pairs = [
                { left: '🐶', right: 'Perro' },
                { left: '🐱', right: 'Gato' },
                { left: '🐰', right: 'Conejo' },
                { left: '🐻', right: 'Oso' },
            ];

            const [leftItems, setLeftItems] = useState([]);
            const [rightItems, setRightItems] = useState([]);
            const [selectedLeft, setSelectedLeft] = useState(null);
            const [matches, setMatches] = useState([]);
            const [attempts, setAttempts] = useState(0);

            useEffect(() => {
                const shuffledLeft = [...pairs].sort(() => Math.random() - 0.5);
                const shuffledRight = [...pairs].sort(() => Math.random() - 0.5);
                setLeftItems(shuffledLeft);
                setRightItems(shuffledRight);
            }, []);

            const handleLeftClick = (index) => {
                if (selectedLeft === index) {
                    setSelectedLeft(null);
                } else {
                    setSelectedLeft(index);
                }
            };

            const handleRightClick = (rightIndex) => {
                if (selectedLeft === null) return;
                setAttempts(attempts + 1);

                const leftItem = leftItems[selectedLeft];
                const rightItem = rightItems[rightIndex];

                if (leftItem.left === rightItem.left && !matches.includes(rightIndex)) {
                    setMatches([...matches, rightIndex]);
                    setSelectedLeft(null);
                    if (matches.length + 1 === pairs.length) {
                        const score = Math.max(10, 20 - attempts);
                        onComplete('Relacionar', score);
                    }
                } else {
                    setSelectedLeft(null);
                }
            };

            return React.createElement(
                'div',
                { className: 'p-6' },
                React.createElement(
                    'div',
                    { className: 'flex justify-between items-center mb-4' },
                    React.createElement('h3', { className: 'text-xl font-bold text-gray-800' }, '🔗 Relacionar Imágenes'),
                    React.createElement('p', { className: 'text-gray-600' }, `Intentos: ${attempts}`)
                ),
                React.createElement(
                    'div',
                    { className: 'flex gap-8 justify-center' },
                    // Columna izquierda
                    React.createElement(
                        'div',
                        { className: 'space-y-2' },
                        leftItems.map((item, index) =>
                            React.createElement(
                                'div',
                                {
                                    key: index,
                                    className: `p-4 rounded-xl text-3xl cursor-pointer transition-all ${
                                        selectedLeft === index ? 'ring-4 ring-indigo-500 bg-indigo-50' : 'bg-white hover:bg-gray-50'
                                    }`,
                                    onClick: () => handleLeftClick(index)
                                },
                                item.left
                            )
                        )
                    ),
                    // Columna derecha
                    React.createElement(
                        'div',
                        { className: 'space-y-2' },
                        rightItems.map((item, index) =>
                            React.createElement(
                                'div',
                                {
                                    key: index,
                                    className: `p-4 rounded-xl bg-white cursor-pointer transition-all ${
                                        matches.includes(index) ? 'bg-green-100 ring-2 ring-green-500' : 'hover:bg-gray-50'
                                    }`,
                                    onClick: () => handleRightClick(index)
                                },
                                matches.includes(index) ? '✅' : item.right
                            )
                        )
                    )
                ),
                matches.length === pairs.length && React.createElement(
                    'div',
                    { className: 'text-center mt-4 text-green-600 font-bold text-xl bounce-in' },
                    '🎉 ¡Has relacionado todo!'
                )
            );
        };

        // ============================================================
        // 🔹 5. JUEGO DE COMPLETAR PALABRA
        // ============================================================
        const WordGame = ({ onComplete }) => {
            const words = [
                { word: 'GATO', hint: '🐱 Animal doméstico' },
                { word: 'PERRO', hint: '🐕 Mejor amigo del hombre' },
                { word: 'SOL', hint: '☀️ Brilla en el cielo' },
                { word: 'LUNA', hint: '🌙 Ilumina la noche' },
            ];

            const [currentWord, setCurrentWord] = useState(0);
            const [input, setInput] = useState('');
            const [attempts, setAttempts] = useState(0);
            const [completed, setCompleted] = useState([]);

            const handleSubmit = () => {
                if (input.toUpperCase() === words[currentWord].word) {
                    setCompleted([...completed, currentWord]);
                    if (completed.length + 1 === words.length) {
                        onComplete('Completar Palabra', 15);
                    } else {
                        setCurrentWord(currentWord + 1);
                        setInput('');
                    }
                } else {
                    setAttempts(attempts + 1);
                    setInput('');
                }
            };

            if (completed.length === words.length) {
                return React.createElement(
                    'div',
                    { className: 'text-center p-6' },
                    React.createElement('div', { className: 'text-6xl mb-4' }, '🎉'),
                    React.createElement('h3', { className: 'text-2xl font-bold text-green-600' }, '¡Completaste todas las palabras!')
                );
            }

            const word = words[currentWord];
            const displayWord = word.word.split('').map((letter, i) => {
                if (i < input.length) return letter;
                if (i === input.length) return '_';
                return '_';
            }).join(' ');

            return React.createElement(
                'div',
                { className: 'p-6 max-w-md mx-auto' },
                React.createElement('h3', { className: 'text-xl font-bold text-gray-800 mb-4' }, '✏️ Completa la Palabra'),
                React.createElement('p', { className: 'text-gray-600 mb-4' }, `Pista: ${word.hint}`),
                React.createElement('div', { className: 'text-4xl font-mono text-center mb-4 tracking-widest' }, displayWord),
                React.createElement(
                    'div',
                    { className: 'flex gap-2' },
                    React.createElement('input', {
                        type: 'text',
                        value: input,
                        onChange: (e) => setInput(e.target.value.toUpperCase()),
                        className: 'flex-1 px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-400 outline-none',
                        placeholder: 'Escribe la palabra...'
                    }),
                    React.createElement(
                        'button',
                        {
                            onClick: handleSubmit,
                            className: 'btn-premium px-6 py-3 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700'
                        },
                        '✓'
                    )
                ),
                React.createElement('p', { className: 'text-sm text-gray-400 mt-2' }, `Intentos: ${attempts}`)
            );
        };

        // ============================================================
        // 🔹 6. COMPONENTES UI
        // ============================================================
        const Button = ({ children, onClick, variant = 'primary', className = '', icon = null }) => {
            const variants = {
                primary: 'bg-gradient-to-r from-indigo-500 to-purple-500 text-white hover:shadow-lg',
                secondary: 'bg-gradient-to-r from-pink-500 to-rose-500 text-white hover:shadow-lg',
                success: 'bg-gradient-to-r from-green-400 to-emerald-500 text-white hover:shadow-lg',
                outline: 'border-2 border-indigo-500 text-indigo-600 hover:bg-indigo-50',
            };

            return React.createElement(
                'button',
                {
                    onClick,
                    className: `btn-premium px-6 py-3 rounded-xl font-semibold transition-all flex items-center gap-2 ${variants[variant]} ${className}`
                },
                icon && React.createElement('span', null, icon),
                children
            );
        };

        const Card = ({ children, className = '' }) => {
            return React.createElement(
                'div',
                { className: `glass rounded-2xl shadow-xl p-6 ${className}` },
                children
            );
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;

            return React.createElement(
                'div',
                { className: 'fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay' },
                React.createElement(
                    'div',
                    { className: 'bg-white rounded-2xl max-w-lg w-full max-h-[80vh] overflow-y-auto p-6 shadow-2xl slide-in' },
                    React.createElement(
                        'div',
                        { className: 'flex justify-between items-center mb-4' },
                        React.createElement('h2', { className: 'text-2xl font-bold text-gray-800' }, title),
                        React.createElement(
                            'button',
                            { onClick: onClose, className: 'text-gray-400 hover:text-gray-600 text-2xl' },
                            '✕'
                        )
                    ),
                    children
                )
            );
        };

        // ============================================================
        // 🔹 7. PÁGINA DE INICIO DEL NIÑO
        // ============================================================
        const HomePage = ({ setCurrentGame, setCurrentLesson }) => {
            const { stars, medals, level, completedLessons } = useChild();
            const { categories, lessons } = useContent();

            const progress = Math.round((completedLessons.length / lessons.length) * 100);

            return React.createElement(
                'div',
                { className: 'space-y-8 fade-in-up' },
                // Hero
                React.createElement(
                    'div',
                    { className: 'bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-3xl p-8 text-white shadow-2xl' },
                    React.createElement(
                        'div',
                        { className: 'flex flex-wrap items-center justify-between gap-4' },
                        React.createElement(
                            'div',
                            { className: 'flex items-center gap-4' },
                            React.createElement('span', { className: 'text-6xl float-animation' }, '👦'),
                            React.createElement('div', null,
                                React.createElement('h1', { className: 'text-3xl font-bold' }, '¡Hola! 👋'),
                                React.createElement('p', { className: 'text-indigo-100' }, '¿Qué quieres aprender hoy?')
                            )
                        ),
                        React.createElement(
                            'div',
                            { className: 'flex items-center gap-4' },
                            React.createElement('span', { className: 'text-2xl' }, `⭐ ${stars}`),
                            React.createElement('span', { className: 'text-2xl' }, `🏅 ${medals}`),
                            React.createElement('span', { className: 'text-2xl' }, `🎯 Nivel ${level}`)
                        )
                    )
                ),

                // Progreso
                React.createElement(
                    Card,
                    null,
                    React.createElement(
                        'div',
                        { className: 'flex justify-between items-center mb-2' },
                        React.createElement('span', { className: 'font-semibold text-gray-700' }, 'Progreso general'),
                        React.createElement('span', { className: 'text-sm text-gray-500' }, `${progress}%` )
                    ),
                    React.createElement(
                        'div',
                        { className: 'progress-bar' },
                        React.createElement('div', { className: 'progress-bar-fill', style: { width: `${progress}%` } })
                    )
                ),

                // Juegos
                React.createElement(
                    'div',
                    null,
                    React.createElement('h2', { className: 'text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2' },
                        React.createElement('span', null, '🎮'),
                        'Juegos'
                    ),
                    React.createElement(
                        'div',
                        { className: 'grid grid-cols-1 md:grid-cols-3 gap-4' },
                        [
                            { id: 'memory', name: 'Memoria', icon: '🧠', color: 'from-blue-400 to-blue-600', desc: 'Encuentra las parejas' },
                            { id: 'matching', name: 'Relacionar', icon: '🔗', color: 'from-green-400 to-emerald-600', desc: 'Une las imágenes' },
                            { id: 'word', name: 'Completar Palabra', icon: '✏️', color: 'from-purple-400 to-purple-600', desc: 'Adivina la palabra' },
                        ].map(game =>
                            React.createElement(
                                'div',
                                {
                                    key: game.id,
                                    className: `game-card bg-gradient-to-r ${game.color} rounded-2xl p-6 text-white shadow-lg`,
                                    onClick: () => setCurrentGame(game.id)
                                },
                                React.createElement('div', { className: 'text-4xl mb-3' }, game.icon),
                                React.createElement('h3', { className: 'text-xl font-bold' }, game.name),
                                React.createElement('p', { className: 'text-sm opacity-90' }, game.desc),
                                React.createElement('div', { className: 'mt-4 text-sm font-semibold' }, '▶ Jugar')
                            )
                        )
                    )
                ),

                // Categorías y Lecciones
                React.createElement(
                    'div',
                    null,
                    React.createElement('h2', { className: 'text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2' },
                        React.createElement('span', null, '📚'),
                        'Lecciones'
                    ),
                    React.createElement(
                        'div',
                        { className: 'grid grid-cols-2 md:grid-cols-4 gap-4' },
                        categories.map(cat =>
                            React.createElement(
                                'div',
                                {
                                    key: cat.id,
                                    className: 'glass rounded-2xl p-4 text-center cursor-pointer hover:shadow-xl transition-all',
                                    onClick: () => setCurrentLesson(cat.id)
                                },
                                React.createElement('div', { className: 'text-4xl mb-2' }, cat.icon),
                                React.createElement('h3', { className: 'font-bold text-gray-800' }, cat.name),
                                React.createElement('p', { className: 'text-xs text-gray-400' },
                                    `${lessons.filter(l => l.categoryId === cat.id).length} lecciones`
                                )
                            )
                        )
                    )
                )
            );
        };

        // ============================================================
        // 🔹 8. PÁGINA DE LECCIONES POR CATEGORÍA
        // ============================================================
        const LessonsPage = ({ categoryId, onBack }) => {
            const { lessons } = useContent();
            const { completedLessons, completeLesson } = useChild();
            const [selectedLesson, setSelectedLesson] = useState(null);

            const categoryLessons = lessons.filter(l => l.categoryId === categoryId);

            const handleComplete = (lesson) => {
                completeLesson(lesson.id);
                setSelectedLesson(null);
            };

            if (selectedLesson) {
                return React.createElement(
                    'div',
                    { className: 'fade-in-up' },
                    React.createElement(
                        'button',
                        { onClick: () => setSelectedLesson(null), className: 'text-indigo-600 hover:text-indigo-800 mb-4 flex items-center gap-2' },
                        '← Volver a lecciones'
                    ),
                    React.createElement(
                        Card,
                        null,
                        React.createElement('div', { className: 'text-6xl mb-4 text-center' }, selectedLesson.image),
                        React.createElement('h2', { className: 'text-2xl font-bold text-gray-800 text-center' }, selectedLesson.title),
                        React.createElement('p', { className: 'text-gray-600 text-center mt-2' }, selectedLesson.description),
                        React.createElement('p', { className: 'text-sm text-gray-400 text-center mt-1' }, `Dificultad: ${selectedLesson.difficulty}`),
                        React.createElement(
                            'div',
                            { className: 'mt-6 text-center' },
                            completedLessons.includes(selectedLesson.id) ?
                                React.createElement('span', { className: 'text-green-600 font-bold text-xl' }, '✅ ¡Completada!') :
                                React.createElement(
                                    Button,
                                    { onClick: () => handleComplete(selectedLesson), variant: 'success' },
                                    '⭐ Completar lección'
                                )
                        )
                    )
                );
            }

            return React.createElement(
                'div',
                { className: 'fade-in-up' },
                React.createElement(
                    'button',
                    { onClick: onBack, className: 'text-indigo-600 hover:text-indigo-800 mb-4 flex items-center gap-2' },
                    '← Volver a categorías'
                ),
                React.createElement(
                    'div',
                    { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                    categoryLessons.map(lesson =>
                        React.createElement(
                            'div',
                            {
                                key: lesson.id,
                                className: `glass rounded-2xl p-6 cursor-pointer hover:shadow-xl transition-all ${
                                    completedLessons.includes(lesson.id) ? 'border-2 border-green-400' : ''
                                }`,
                                onClick: () => setSelectedLesson(lesson)
                            },
                            React.createElement('div', { className: 'flex justify-between items-start' },
                                React.createElement('div', null,
                                    React.createElement('div', { className: 'text-4xl mb-2' }, lesson.image),
                                    React.createElement('h3', { className: 'font-bold text-gray-800' }, lesson.title),
                                    React.createElement('p', { className: 'text-sm text-gray-500' }, lesson.description)
                                ),
                                completedLessons.includes(lesson.id) &&
                                    React.createElement('span', { className: 'text-2xl' }, '✅')
                            ),
                            React.createElement('div', { className: 'mt-2 flex justify-between text-sm text-gray-400' },
                                React.createElement('span', null, `Dificultad: ${lesson.difficulty}`),
                                completedLessons.includes(lesson.id) ?
                                    React.createElement('span', { className: 'text-green-600 font-bold' }, 'Completada') :
                                    React.createElement('span', null, '🔓 Click para abrir')
                            )
                        )
                    )
                )
            );
        };

        // ============================================================
        // 🔹 9. APP PRINCIPAL
        // ============================================================
        const App = () => {
            const [currentView, setCurrentView] = useState('home'); // home | game | lessons
            const [currentGame, setCurrentGame] = useState(null);
            const [currentCategory, setCurrentCategory] = useState(null);
            const [showGameResult, setShowGameResult] = useState(false);
            const [gameResult, setGameResult] = useState(null);
            const { addGameResult } = useChild();

            const handleGameComplete = (gameName, score) => {
                addGameResult(gameName, score);
                setGameResult({ gameName, score });
                setShowGameResult(true);
                setTimeout(() => {
                    setShowGameResult(false);
                    setCurrentView('home');
                    setCurrentGame(null);
                }, 3000);
            };

            const renderGame = () => {
                switch (currentGame) {
                    case 'memory':
                        return React.createElement(MemoryGame, { onComplete: handleGameComplete });
                    case 'matching':
                        return React.createElement(MatchingGame, { onComplete: handleGameComplete });
                    case 'word':
                        return React.createElement(WordGame, { onComplete: handleGameComplete });
                    default:
                        return null;
                }
            };

            return React.createElement(
                ChildProvider,
                null,
                React.createElement(
                    ContentProvider,
                    null,
                    React.createElement(
                        'div',
                        { className: 'min-h-screen p-4 md:p-8' },
                        React.createElement(
                            'div',
                            { className: 'max-w-6xl mx-auto' },
                            // Header
                            React.createElement(
                                'header',
                                { className: 'flex justify-between items-center mb-8' },
                                React.createElement(
                                    'div',
                                    { className: 'flex items-center gap-2' },
                                    React.createElement('span', { className: 'text-3xl float-animation' }, '🚀'),
                                    React.createElement('h1', { className: 'text-2xl font-bold text-gray-800' }, 'Ciborg Kids')
                                ),
                                currentView !== 'home' && React.createElement(
                                    'button',
                                    {
                                        onClick: () => {
                                            setCurrentView('home');
                                            setCurrentGame(null);
                                            setCurrentCategory(null);
                                        },
                                        className: 'px-4 py-2 rounded-xl bg-gray-200 hover:bg-gray-300 transition-all text-sm font-semibold'
                                    },
                                    '🏠 Inicio'
                                )
                            ),
                            // Contenido
                            currentView === 'home' &&
                                React.createElement(HomePage, {
                                    setCurrentGame: (game) => {
                                        setCurrentGame(game);
                                        setCurrentView('game');
                                    },
                                    setCurrentLesson: (catId) => {
                                        setCurrentCategory(catId);
                                        setCurrentView('lessons');
                                    }
                                }),
                            currentView === 'game' &&
                                React.createElement(
                                    'div',
                                    { className: 'fade-in-up' },
                                    renderGame()
                                ),
                            currentView === 'lessons' &&
                                React.createElement(LessonsPage, {
                                    categoryId: currentCategory,
                                    onBack: () => setCurrentView('home')
                                }),
                            // Resultado del juego
                            showGameResult && gameResult &&
                                React.createElement(
                                    'div',
                                    { className: 'fixed inset-0 flex items-center justify-center z-50' },
                                    React.createElement(
                                        'div',
                                        { className: 'bg-white rounded-3xl shadow-2xl p-8 text-center slide-in max-w-sm' },
                                        React.createElement('div', { className: 'text-6xl mb-4' }, '🎉'),
                                        React.createElement('h2', { className: 'text-2xl font-bold text-gray-800' }, '¡Excelente!'),
                                        React.createElement('p', { className: 'text-gray-600 mt-2' }, `Has ganado ${gameResult.score} ⭐ en ${gameResult.gameName}`),
                                        React.createElement(
                                            'div',
                                            { className: 'mt-4 text-4xl star-rating' },
                                            '⭐'.repeat(Math.min(5, Math.ceil(gameResult.score / 3)))
                                        )
                                    )
                                )
                        )
                    )
                )
            );
        };

        // ============================================================
        // 🔹 10. RENDERIZADO
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App, null));
    </script>
</body>
</html>
